<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cherry Mobile</title>
    <meta name="theme-color" content="#f5efe3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cherry Mobile" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="./icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" sizes="180x180" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <header class="hero">
      <div>
        <p class="eyebrow">Phone Console</p>
        <h1>Cherry Mobile</h1>
        <p class="subtle">在手机上查看 Cherry 的助手、话题和历史正文，也能继续发消息。</p>
        <div class="mode-switch" id="modeSwitch">
          <button class="mode-button active" data-mode="history" type="button">历史对话</button>
          <button class="mode-button" data-mode="agents" type="button">Agent 会话</button>
        </div>
      </div>
      <div class="hero-actions">
        <span id="healthBadge" class="status-pill">连接中</span>
        <button id="refreshAllButton" class="secondary-button" type="button">刷新</button>
      </div>
    </header>

    <main id="shell" class="shell history-mode">
      <section id="assistantPanel" class="panel assistants-panel">
        <div class="panel-top panel-heading">
          <div>
            <p class="eyebrow">Cherry History</p>
            <h2>助手</h2>
          </div>
        </div>
        <div id="assistantList" class="assistant-list"></div>
      </section>

      <section class="panel sidebar">
        <div id="historyControls" class="panel-top panel-heading">
          <div>
            <p id="listLabel" class="eyebrow">Assistant Topics</p>
            <h2 id="listTitle">话题</h2>
          </div>
        </div>

        <div id="agentControls" class="panel-top hidden">
          <label class="field">
            <span>Agent</span>
            <select id="agentSelect"></select>
          </label>
          <button id="newSessionButton" class="primary-button" type="button">新会话</button>
        </div>
        <div id="sessionList" class="session-list"></div>
      </section>

      <section class="panel conversation">
        <div class="conversation-top">
          <button id="backButton" class="secondary-button back-button" type="button">← 返回</button>
          <div>
            <p id="conversationLabel" class="eyebrow">History</p>
            <h2 id="conversationTitle">选择一个话题</h2>
          </div>
          <button id="refreshSessionButton" class="secondary-button" type="button">刷新当前</button>
        </div>

        <div id="messages" class="messages">
          <div class="empty-state">
            <p>会话内容会显示在这里。</p>
          </div>
        </div>

        <form id="composer" class="composer">
          <textarea
            id="composerInput"
            rows="3"
            placeholder="给当前 Cherry 会话继续发消息"
          ></textarea>
          <div class="composer-actions">
            <p id="composerHint" class="subtle">如果没选会话，发送时会自动创建一个新会话。</p>
            <button id="sendButton" class="primary-button" type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
